<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GraspAI Extension</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <div class="header">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);">
        <path d="M17 8h1a4 4 0 1 1 0 8h-1"/>
        <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/>
        <line x1="6" x2="6" y1="2" y2="4"/>
        <line x1="10" x2="10" y1="2" y2="4"/>
        <line x1="14" x2="14" y1="2" y2="4"/>
      </svg>
      <h2>GraspAI</h2>
    </div>

    <!-- Login View -->
    <div id="login-view" class="view">
      <p class="subtitle">Log in to your GraspAI account</p>
      <form id="login-form">
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" required>
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" required>
        </div>
        <div class="error-msg" id="login-error"></div>
        <button type="submit" class="btn primary-btn" id="login-btn">Log In</button>
      </form>
    </div>

    <!-- Main View -->
    <div id="main-view" class="view hidden">
      <p class="subtitle">Turn text into flashcards</p>
      
      <div class="input-group">
        <label for="session-select">Select Study Session</label>
        <select id="session-select">
          <option value="">Loading sessions...</option>
        </select>
      </div>

      <div class="input-group">
        <label for="selection-text">Selected Text</label>
        <textarea id="selection-text" rows="5" placeholder="Highlight text on the page or paste here..."></textarea>
      </div>

      <div class="credits-info">
        Credits remaining: <span id="credits-count">...</span>
      </div>
      
      <div class="error-msg" id="main-error"></div>
      <div class="success-msg" id="main-success"></div>

      <button class="btn primary-btn" id="generate-btn">Generate & Add (1 Credit)</button>
      <button class="btn secondary-btn" id="logout-btn">Log Out</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
